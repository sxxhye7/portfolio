<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 리터러시의 이해 - 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Pretendard와 Libre Baskerville(로고용) 폰트 임포트 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            scroll-behavior: smooth;
            background-color: #f9fbf7; /* 맑은 말차 아이보리 배경 */
        }

        /* 로고 전용 폰트 스타일 */
        .logo-font {
            font-family: 'Libre Baskerville', serif;
            letter-spacing: -0.02em;
        }

        .glass-nav {
            background: rgba(250, 252, 248, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(143, 161, 131, 0.15);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #9bb08f 0%, #b8c9ac 40%, #e8c4c4 100%);
        }

        /* 카드 호버 모션 강화 */
        .card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #ffffff;
            border: 1px solid #edf2ec;
        }

        .card-hover:hover {
            transform: translateY(-15px); /* 더 높게 떠오르는 모션 */
            box-shadow: 0 25px 40px -15px rgba(143, 161, 131, 0.3);
            border-color: #e8c4c4;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f7f4;
        }
        ::-webkit-scrollbar-thumb {
            background: #b8c9ac;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9bb08f;
        }
    </style>
</head>
<body class="text-slate-700">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-nav px-6 py-4">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold logo-font bg-clip-text text-transparent bg-gradient-to-r from-[#5a6652] to-[#b58a8a] drop-shadow-sm">
                Understanding of AI Literacy
            </h1>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-gradient text-white h-screen flex flex-col items-center justify-center px-6 relative">
        <div class="max-w-4xl mx-auto text-center w-full reveal active">
            <span class="inline-block px-4 py-1 rounded-full bg-white/25 text-white text-sm font-medium mb-6 border border-white/30 backdrop-blur-sm shadow-sm">2026년 1학기 포트폴리오</span>
            <h2 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight tracking-tight">
                AI 리터러시의 이해:<br>
                <span class="font-light opacity-90 text-[0.85em]">데이터에서 이야기까지</span>
            </h2>
            <div class="w-24 h-1 bg-white/50 mx-auto mb-8 rounded-full"></div>
            <p class="text-lg md:text-xl text-white max-w-2xl mx-auto leading-relaxed font-medium drop-shadow-sm">
                생성형 AI와 데이터 분석 도구를 활용하여 현실 세계의 문제를 이해하고,<br class="hidden md:block">
                그 결과를 의미 있는 이야기와 콘텐츠로 표현한 10개의 기록입니다.
            </p>
        </div>

        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-80">
            <i class="fa-solid fa-chevron-down text-2xl text-white"></i>
        </div>
    </section>

    <!-- Portfolio Grid -->
    <section id="projects" class="py-32 px-6">
        <div class="max-w-[1600px] mx-auto">
            <div class="mb-12 reveal text-center md:text-left">
                <h3 class="text-3xl font-bold mb-2 text-[#5a6652]">My Assignments</h3>
                <div class="h-1 w-20 bg-[#e8c4c4] rounded mx-auto md:mx-0"></div>
            </div>

            <!-- Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-6" id="assignment-grid">
                <!-- Cards will be injected here by JS -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <footer id="contact" class="py-16 px-6 bg-[#f4f7f2] border-t border-[#e5ece3]">
        <div class="max-w-[1600px] mx-auto text-center">
            <h3 class="text-2xl font-bold mb-4 text-[#5a6652]">함께 소통해요</h3>
            <p class="text-slate-500 mb-8">AI 리터러시에 대한 더 많은 질문은 아래로 연락주세요.</p>
            <div class="flex justify-center space-x-6">
                <a href="#" class="text-3xl text-[#a7b99c] hover:text-[#d9b4b4] transition"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="text-3xl text-[#a7b99c] hover:text-[#d9b4b4] transition"><i class="fa-solid fa-envelope"></i></a>
                <a href="#" class="text-3xl text-[#a7b99c] hover:text-[#b58a8a] transition"><i class="fa-brands fa-linkedin"></i></a>
            </div>
            <p class="mt-12 text-sm text-slate-400">&copy; 2026 AI 리터러시의 이해 Portfolio. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const assignments = [
            { 
                id: 1, 
                title: "AI의 이해", 
                desc: "구글 노트북LM을 활용한 실습:<br>AI의 개념과 역사, 생성형 AI에 대한 자료 정리", 
                icon: "fa-microchip", 
                color: "text-[#8fa183]",
                hasButton: true,
                link: "./03/ai의이해.html" 
            },
            { 
                id: 2, 
                title: "데이터 스토리텔링", 
                desc: "공공데이터를 분석하고 인사이트를 도출하여 시각적으로 설득력 있는 리포트 작성하여 스토리북으로 만들기", 
                icon: "fa-book-open", 
                color: "text-[#a7b99c]" 
            },
            { id: 3, title: "데이터 정제", desc: "공개 데이터를 수집하고 가공합니다.", icon: "fa-database", color: "text-[#b58a8a]" },
            { id: 4, title: "데이터 시각화", desc: "차트와 그래프로 인사이트를 도출합니다.", icon: "fa-chart-pie", color: "text-[#d9b4b4]" },
            { id: 5, title: "AI 윤리 분석", desc: "윤리적 쟁점과 저작권을 고찰합니다.", icon: "fa-scale-balanced", color: "text-[#8fa183]" },
            { id: 6, title: "텍스트 요약", desc: "긴 문서를 AI를 통해 핵심 요약합니다.", icon: "fa-file-lines", color: "text-[#a7b99c]" },
            { id: 7, title: "이미지 생성", desc: "AI 도구를 활용한 창의적 이미지 생성 실습.", icon: "fa-image", color: "text-[#b58a8a]" },
            { id: 8, title: "AI 스토리텔링", desc: "데이터와 AI를 결합한 내러티브 제작.", icon: "fa-book", color: "text-[#d9b4b4]" },
            { id: 9, title: "문제 해결 솔루션", desc: "사회 문제 해결을 위한 AI 활용 기획.", icon: "fa-lightbulb", color: "text-[#8fa183]" },
            { id: 10, title: "최종 포트폴리오", desc: "학기 전체 활동 정리 및 성찰 프로젝트.", icon: "fa-award", color: "text-[#b58a8a]" }
        ];

        const grid = document.getElementById('assignment-grid');
        assignments.forEach(task => {
            const card = document.createElement('div');
            card.className = "reveal bg-white p-7 rounded-2xl card-hover flex flex-col items-start h-full min-h-[260px]";
            
            let buttonHtml = '';
            if (task.hasButton) {
                buttonHtml = `
                    <a href="${task.link}" target="_blank" class="mt-auto w-full py-2.5 px-4 bg-[#8fa183] text-white text-xs font-bold rounded-xl text-center hover:bg-[#7a8c6f] transition-colors duration-300 flex items-center justify-center gap-2">
                        웹페이지로 이동 <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                    </a>
                `;
            }

            card.innerHTML = `
                <div class="w-full">
                    <div class="w-12 h-12 rounded-xl bg-[#f9fbf7] flex items-center justify-center mb-5 border border-[#edf2ec]">
                        <i class="fa-solid ${task.icon} ${task.color} text-xl"></i>
                    </div>
                    <span class="text-[10px] font-bold text-[#a7b99c] uppercase tracking-[0.2em]">Assignment ${task.id}</span>
                    <h4 class="text-lg font-bold mt-2 mb-3 text-slate-800 transition line-clamp-1">${task.title}</h4>
                    <p class="text-slate-500 text-xs leading-relaxed font-light mb-6">${task.desc}</p>
                </div>
                ${buttonHtml}
            `;
            grid.appendChild(card);
        });

        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }

        window.addEventListener("scroll", reveal);
        window.onload = reveal;
    </script>
</body>
</html>
